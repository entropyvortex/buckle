name: Release

on:
  workflow_dispatch:
    inputs:
      create_github_release:
        description: 'Also create a GitHub Release?'
        required: false
        default: true
        type: boolean

  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write      # REQUIRED for npm Trusted Publishing (OIDC)

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          # IMPORTANT: Do NOT set registry-url when using Trusted Publishing (OIDC).
          # Setting it interferes with the OIDC token exchange and causes ENEEDAUTH.

      - name: Validate version (tag-triggered releases)
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG_VERSION=${GITHUB_REF#refs/tags/v}
          PKG_VERSION=$(node -p "require('./package.json').version")

          echo "Tag version:    v${TAG_VERSION}"
          echo "Package version: ${PKG_VERSION}"

          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag version (v${TAG_VERSION}) does not match package.json version (${PKG_VERSION})"
            echo "Please bump the version in package.json to ${TAG_VERSION} before tagging."
            exit 1
          fi
          echo "Version validation passed."

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Publish to npm (Trusted Publishing)
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "Attempting to publish buckle-cli@$VERSION using Trusted Publishing..."
          npm publish --provenance --access public
        # This step relies on the Trusted Publisher configured on npmjs.com
        # for the "buckle-cli" package pointing to this repository + release.yml

      - name: Create GitHub Release
        if: github.event_name == 'push' || inputs.create_github_release == true
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
