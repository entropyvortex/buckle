version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 8
    commit-message:
      prefix: "chore(deps)"

    # Group minor and patch updates to reduce noise
    groups:
      production-dependencies:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
        exclude-patterns:
          - "ink"           # Major version carries React upgrade risk
          - "react"
          - "eslint"
          - "zod"
          - "typescript"
          - "commander"
          - "lint-staged"

      dev-dependencies:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

    # Ignore major versions for risky packages until we evaluate them
    ignore:
      - dependency-name: "ink"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react"
        update-types: ["version-update:semver-major"]
      - dependency-name: "eslint"
        update-types: ["version-update:semver-major"]
      - dependency-name: "zod"
        update-types: ["version-update:semver-major"]
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]
      - dependency-name: "commander"
        update-types: ["version-update:semver-major"]
      - dependency-name: "lint-staged"
        update-types: ["version-update:semver-major"]